name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        sudo mkdir -p /usr/local/lib/android/sdk/cmdline-tools
        cd /usr/local/lib/android/sdk/cmdline-tools
        sudo wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        sudo unzip -q commandlinetools-linux-*_latest.zip
        sudo mv cmdline-tools latest
        sudo chmod -R 755 /usr/local/lib/android/sdk
        echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH

    - name: Install SDK components
      run: |
        yes | sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      continue-on-error: true

    - name: Make gradlew executable
      run: chmod +x gradlew
      working-directory: XiaoAnApp

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
      working-directory: XiaoAnApp

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: XiaoAnApp-debug
        path: XiaoAnApp/app/build/outputs/apk/debug/app-debug.apk
